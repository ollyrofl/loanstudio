[build]
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.css]
  minify = true

[build.processing.js]
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/iconify-icon.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/marked.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirects from old website
[[redirects]]
  from = "/ask-loan-studio/blogs-and-articles/*"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/ask-loan-studio"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/ask-loan-studio/*"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/insurance/"
  to = "/"
  status = 301

[[redirects]]
  from = "/financial-planning/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 301
